<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Room Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="join-sidebar">
        <div class="brand-block">
          <p class="eyebrow">Friend chat</p>
          <p class="subcopy">
            Join with a room code, keep the same room forever, and customize your
            messages with a profile picture, emoji, and GIFs.
          </p>
        </div>

        <form id="join-form" class="join-form">
          <div class="profile-row">
            <label class="avatar-picker" for="avatar-input">
              <img id="avatar-preview" alt="Profile preview" />
              <span>Choose PFP</span>
            </label>
            <input id="avatar-input" type="file" accept="image/*" hidden />

            <label class="identity-field">
              <span>Your name</span>
              <input id="name" name="name" maxlength="30" placeholder="Aisha" required />
            </label>
          </div>

          <label>
            <span>Room code</span>
            <input
              id="room-code"
              name="roomCode"
              maxlength="40"
              placeholder="best-friends"
              required
            />
          </label>

          <div class="actions">
            <button type="submit">Join room</button>
            <button type="button" id="notify-btn" class="secondary">
              Enable notifications
            </button>
          </div>
        </form>
      </aside>

      <section class="chat-shell">
        <header class="topbar">
          <div>
            <p class="room-label">Room</p>
            <h2 id="room-title">Pick a room</h2>
          </div>
          <div class="topbar-actions">
            <div id="status" class="status">Choose a room to get started.</div>
            <button id="copy-link-btn" class="secondary">Copy invite link</button>
          </div>
        </header>

        <div id="room-view" class="room-view hidden">
          <div id="messages" class="messages" aria-live="polite"></div>

          <form id="message-form" class="message-form">
            <div id="reply-banner" class="reply-banner hidden">
              <div>
                <strong id="reply-author"></strong>
                <p id="reply-text"></p>
              </div>
              <button type="button" id="cancel-reply-btn" class="tiny-button secondary">
                Cancel
              </button>
            </div>

            <div class="composer-main">
              <textarea
                id="message-input"
                rows="3"
                maxlength="1000"
                placeholder="Message your friend..."
              ></textarea>
            </div>

            <div id="gif-preview" class="gif-preview hidden">
              <img id="gif-preview-image" alt="GIF preview" />
              <button type="button" id="clear-gif-btn" class="tiny-button">Remove GIF</button>
            </div>

            <div class="composer-toolbar">
              <div class="tool-group">
                <button type="button" id="emoji-btn" class="secondary">Emoji</button>
                <button type="button" id="gif-btn" class="secondary">GIF</button>
              </div>
              <button type="submit">Send message</button>
            </div>

            <div id="emoji-panel" class="emoji-panel hidden"></div>

            <label id="gif-input-wrap" class="gif-input-wrap hidden">
              <span>Paste a GIF URL</span>
              <input
                id="gif-url-input"
                type="text"
                placeholder="Paste a GIF link"
              />
            </label>
          </form>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
